name: Monthly Schema Refresh
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh all timestamps
        run: |
          TIMESTAMP=\$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TODAY=\$(date -u +%Y-%m-%d)
          find faqs help services webpages personnel -name '*.json' 2>/dev/null | while read file; do
            sed -i "s/\\"dateModified\\":.*./\\"dateModified\\": \\"\$TIMESTAMP\\",/" "\$file" 2>/dev/null || true
          done
          [ -f "sitemap.xml" ] && sed -i "s|<lastmod>[0-9]\\{4\\}-[0-9]\\{2\\}-[0-9]\\{2\\}</lastmod>|<lastmod>\$TODAY</lastmod>|g" sitemap.xml
          find . -name '*.html' -exec sed -i "s|Last updated: [0-9]\\{4\\}-[0-9]\\{2\\}-[0-9]\\{2\\}|Last updated: \$TODAY|g" {} \\;
          git config user.name 'Schema Publisher'
          git config user.email 'noreply@schema.publisher'
          git add -A
          git diff --staged --quiet || (git commit -m '📅 Monthly refresh - Y.O.R. Construction & Investments, Inc.' && git push)
      - name: Ping Google & Bing
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://AIOVisibilityHub.github.io/y-o-r-construction-investments-inc-ai-schemas-kjmt/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://AIOVisibilityHub.github.io/y-o-r-construction-investments-inc-ai-schemas-kjmt/sitemap.xml" || true
